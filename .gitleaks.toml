# .gitleaks.toml
# Gitleaks configuration for the CDC Lakehouse assignment repository.
# Extends the default ruleset with allowlists for known test/sample data.

title = "CDC Lakehouse Assignment"

[extend]
# Use the default gitleaks ruleset as the base
useDefault = true

[allowlist]
description = "Known safe patterns — test data and pipeline internals"

# Test fixture emails used throughout submission/tests/ and scripts/
regexes = [
    # example.com addresses used as test fixtures
    '''[a-z]+@example\.com''',
]

# Specific known-safe strings (exact match)
stopwords = [
    "example.com",
    "ref-001",
    "ref-002",
    "primary_key",
    "GITHUB_TOKEN",
]

# Paths that are safe to skip entirely
paths = [
    '''submission/tests/''',
    '''submission/scripts/run_data_quality_checks\.py''',
    '''submission/tests/conftest\.py''',
]
